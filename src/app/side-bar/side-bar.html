<aside class="sidebar">
  <div class="logo">
    <div class="logo-icon">🎓</div>
    <h2 class="logo-text">CollabProject</h2>
  </div>

  <nav class="nav-menu">
    <div *ngFor="let item of menuItems" class="menu-item-wrapper">
      <!-- Parent Menu Item (with children - no route) -->
      <div 
        *ngIf="item.children"
        class="menu-item has-children"
        [class.expanded]="item.expanded"
        (click)="toggleMenu(item)"
      >
        <span class="menu-icon">{{ item.icon }}</span>
        <span class="menu-label">{{ item.label }}</span>
        <span class="expand-icon">
          {{ item.expanded ? '▼' : '▶' }}
        </span>
      </div>

      <!-- Parent Menu Item (without children - with route) -->
      <a 
        *ngIf="!item.children && item.route"
        class="menu-item"
        [routerLink]="[item.route]"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        <span class="menu-icon">{{ item.icon }}</span>
        <span class="menu-label">{{ item.label }}</span>
      </a>

      <!-- Child Menu Items (Dropdown) -->
      <div class="submenu" *ngIf="item.children && item.expanded">
        <a 
          *ngFor="let child of item.children"
          [routerLink]="child.route"
          routerLinkActive="active"
          class="submenu-item"
        >
          <span class="submenu-icon">{{ child.icon }}</span>
          <span class="submenu-label">{{ child.label }}</span>
        </a>
      </div>
    </div>
  </nav>
</aside>

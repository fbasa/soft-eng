<nav class="sideBar" [class.collapsed]="!isOpen">
  <button
    type="button"
    class="sideBar_toggle"
    (click)="toggleSideBar()"
    [attr.aria-expanded]="isOpen"
    aria-controls="sidebar-panel"
  >
    <span class="toggle-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" focusable="false">
        <path
          d="M7 12h10M7 7h10M7 17h6"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
    </span>
    <span class="toggle-text">Menu</span>
  </button>

  <div class="sideBar_inner" id="sidebar-panel">
    <header class="sideBar_heading">
      <div class="heading_badge">SJC</div>
      <div class="heading_text">
        <h2>DevSync Squad</h2>
        <p>Ship smarter together</p>
      </div>
    </header>

    <nav class="sideBar_nav" aria-label="Primary">
      <ul class="sideBar_menu">

          class="menu_item active"
          [attr.aria-label]="!isOpen ? 'Dashboard' : null"

              />
              <path
                d="M5 12.5L5 16L12 20L19 16L19 12.5L12 15.5Z"

              />
            </svg>

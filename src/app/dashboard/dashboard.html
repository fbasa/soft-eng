       <div class="outlet-content">
            <p-button icon="pi pi-home" aria-label="Save" />
            <p-inputgroup>
              <p-inputgroup-addon>
                <i class="pi pi-user"></i>
              </p-inputgroup-addon>
              <input pInputText [(ngModel)]="text1" placeholder="Username" />
            </p-inputgroup>

            <p-toolbar>
              <ng-template #start>
                <p-button icon="pi pi-plus" class="mr-2" text severity="secondary" />
                <p-button icon="pi pi-print" class="mr-2" text severity="secondary" />
                <p-button icon="pi pi-upload" text severity="secondary" />
              </ng-template>
              <ng-template #center>
                <p-iconfield iconPosition="left">
                  <p-inputicon class="pi pi-search" />
                  <input type="text" pInputText placeholder="Search" />
                </p-iconfield>
              </ng-template>
              <ng-template #end>
                <p-splitbutton label="Save" [model]="items" />
              </ng-template>
            </p-toolbar>
<p-table [value]="products" [tableStyle]="{ 'min-width': '50rem' }">
    <ng-template #header>
        <tr>
            <th>Code</th>
            <th>Name</th>
            <th>Category</th>
            <th>Quantity</th>
        </tr>
    </ng-template>
    <ng-template #body let-product>
        <tr>
            <td>{{ product.code }}</td>
            <td>{{ product.name }}</td>
            <td>{{ product.category }}</td>
            <td>{{ product.quantity }}</td>
        </tr>
    </ng-template>
</p-table>

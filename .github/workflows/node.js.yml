# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - run: npm run build --if-present
    #- run: npm test
    
    - name: Locate build output
      id: dist
      shell: bash
      run: |
          # Angular 17+ defaults to dist/<app>/browser; older: dist/<app>
          DIR=$(find dist -type d -name browser -print -quit)
          if [ -z "$DIR" ]; then
            DIR=$(find dist -mindepth 1 -maxdepth 1 -type d -print -quit || echo dist)
          fi
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"
          
    - name: Add SPA fallback (404 -> index.html)
      run: cp "${{ steps.dist.outputs.dir }}/index.html" "${{ steps.dist.outputs.dir }}/404.html"
    - name: Deploy to GitHub Pages
      uses: crazy-max/ghaction-github-pages@v4.2.0
      with:
         # Build directory to deploy
        build_dir: /
        github_token: ${{ secrets.GITHUB_TOKEN }}

          
